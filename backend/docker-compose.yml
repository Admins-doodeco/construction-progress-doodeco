version: '3.8'

services:
  postgres_db:
    image: postgres:15-alpine
    container_name: construction_progress_local_db
    restart: always
    environment:
      POSTGRES_PASSWORD: rootpassword
      POSTGRES_DB: localdb
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  minio:
    image: minio/minio
    container_name: construction_progress_minio
    restart: always
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

volumes:
  postgres_data:
  minio_data:
